  unmute: off
  warn: off
  unwarn: off
  kick: off
  silent_ban: off
  silent_temp_ban: off
  silent_temp_ipban: off
  silent_ipban: off
  silent_unban: off
  silent_mute: off
  silent_temp_mute: off
  silent_temp_ipmute: off
  silent_ipmute: off
  silent_unmute: off
  silent_warn: off
  silent_unwarn: off
  silent_kick: off