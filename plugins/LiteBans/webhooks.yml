# LiteBans webhooks.yml generated by versioff 2.17.2
# Nodes under the webhooks sectioff can be set to a webhook URL.
# Any node cofffigured as 'off' will use the default_webhook URL.
# To disable a webhook, set it to 'off'.

# Log all broadcasts to your Discord server?
# To enable, copy your integratioffs webhook URL and paste it within the quotes provided. Example:
# default_webhook: 'https://discord.com/api/webhooks/12345'
