# Доступные действия:
# [MESSAGE] <сообщение> - отправляет сообщение игроку
# [BROADCAST] <сообщение> - отправляет сообщение всем игрокам
# [TITLE] <тайтл;субтайтл;время-появления;время-показа;время-убывания> - отправляет title игроку
# [SOUND] <айди;громкость;тон> - проигрывает звук игроку
# [EFFECT] <айди;время;уровень> - выдаёт эффект игроку
# [PLAYER] <команда> - выполняет команду от игрока
# [CONSOLE] <команда> - выполняет команду от консоли
# [CLOSE] - закрыть меню
# 
# Вызывается когда игрок входит в очередь
on-pvp-join-queue: []

# Вызывается когда игрок выходит из очереди
on-pvp-quit-queue: []

# Вызывается когда игроков начинает телепортировать (во время таймера)
on-pvp-pre-teleport:
  player: []
  partner: []

# Вызывается когда игроков телепортировало
on-pvp-teleport:
  player: []
  partner: []

# Вызывается когда один из игроков умер (или вышел с сервера)
on-pvp-death:
  killer: []
  killed: []
