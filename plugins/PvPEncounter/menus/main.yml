# Заголовок меню
title: "§0● Найти противника"
# Количество слотов в меню
size: 45

items:
  # Настройка предмета для входа в очередь
  join:
    # Скрывать ли предмет если игрок в очереди
    hide-if-in-queue: false
    # Материал предмета
    # Для добавления кастомной головы используйте basehead-<value>
    material: "NETHERITE_SWORD"
    # Слот предмета
    slot: 21
    # Название предмета
    name: "&cВойти в очередь"
    # Описание предмета
    lore:
      - ""
      - " &7Найдите для себя достойного"
      - " &7соперника, чтобы сразиться с ним! "
      - ""
      - "§a➠ Нажмите, чтобы войти"

  # Настройка предмета для выхода из очереди
  quit:
    # Скрывать ли предмет если игрок не в очереди
    hide-if-not-in-queue: false
    # Материал предмета
    # Для добавления кастомной головы используйте basehead-<value>
    material: "BARRIER"
    # Слот предмета
    slot: 23
    # Название предмета
    name: " "
    # Описание предмета
    lore:
      - " &aВыйти из очереди "
      - ""

  # Настройка предмета для выхода из очереди
  player-list:
    # Скрывать ли предмет
    # Мб кому-то надо я хз 🤔
    hide: true
    # Материал предмета
    # Для добавления кастомной головы используйте basehead-<value>
    # 
    # Отображается только в режиме LIST в searchMode
    material: "PAPER"
    # Слот предмета
    slot: 34
    # Название предмета
    name: " "
    # Описание предмета
    lore:
      - " &#2ffbb8Список игроков "
      - ""

# Добавление своих предметов без функционала
# Если ничего не хотите добавлять, то в значение строки впишите {}
# 
# Доступные действия для click-actions:
# [MESSAGE] <сообщение> - отправляет сообщение игроку
# [BROADCAST] <сообщение> - отправляет сообщение всем игрокам
# [TITLE] <тайтл;субтайтл;время-появления;время-показа;время-убывания> - отправляет title игроку
# [SOUND] <айди;громкость;тон> - проигрывает звук игроку
# [EFFECT] <айди;время;уровень> - выдаёт эффект игроку
# [PLAYER] <команда> - выполняет команду от игрока
# [CONSOLE] <команда> - выполняет команду от консоли
# [CLOSE] - закрыть меню
custom-items:
  example:
    material: "BLACK_STAINED_GLASS_PANE"
    slots:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 36
      - 37
      - 38
      - 39
      - 40
      - 41
      - 42
      - 43
      - 44
    name: "&0"
    lore: null
    click-actions: null
