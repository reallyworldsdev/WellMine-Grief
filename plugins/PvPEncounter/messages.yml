# {prefix} - Префикс перед сообщениями
prefix: "§x§F§C§A§E§0§0&lɢ§x§F§C§B§4§0§0&lʀ§x§F§D§B§B§0§0&lɪ§x§F§D§C§1§0§0&lᴇ§x§F§E§C§8§0§0&lꜰ§x§F§E§C§E§0§0&lʏ§x§F§F§D§5§0§0&lᴏ§x§F§F§D§B§0§0&lᴜ §7»"

# Сообщение отправляемое при входе в очередь
join-queue: "{prefix} &fВы добавлены в очередь"
# Сообщение отправляемое при телепортации
teleport-player: "{prefix} &fИгрок &c{player} &fнайден! Телепортация..."
# Сообщение отправляемое при выходе одного из игрока во время таймера
player-left: "{prefix} &fИгрок &c{player} &fвышел. Телепортация отменена"
# Сообщение отправляемое при входе в очередь если игрок уже состоит в ней
already-queue: "{prefix} &fВы уже в очереди"
# Сообщение отправляемое при выходе из очереди
quit-queue: "{prefix} &fВы вышли из очереди"
# Сообщение отправляемое при выходе из очереди если игрок в ней нет
not-queue: "{prefix} &fВы не состоите в очереди"
# Сообщение отправляемое при попытке телепортироваться к игроку если он не найден
player-not-found: "{prefix} &fИгрок не найден"
# Сообщение отправляемое если локация не была найдена
location-not-found: "{prefix} &fЛокация не найдена, телепортация отменена"

# Сообщение при перезагрузке плагина
reload: "{prefix} &fПлагин перезагружен"

# Сообщение над инвентарем при ожидании игрока
actionbar-message: "&fОжидание игрока..."

# Сообщение отправляемое при миграции YAML конфига со статистиков в базу данных
migrate-message: "{prefix} &fМиграция успешно завершена"
